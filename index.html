<!DOCTYPE html>
<html>
<head>
  <title>NO-risk</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Inter", Arial;
  background: linear-gradient(to bottom, #1e293b, #0f172a);
  color: #e2e8f0;
  transition: 0.3s;
}

/* LIGHT */
body.light {
  background: radial-gradient(circle, #ffffff, #e2e8f0);
  color: #0f172a;
}

/* GLASS */
body.glass {
  background: linear-gradient(120deg, #1e3a8a, #0f172a);
}

/* NAV */
.navbar {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(10px);
}

.logo { color: #60a5fa; font-weight: 600; }

.nav-links a {
  margin-left: 12px;
  color: inherit;
  text-decoration: none;
}

.toggle { cursor: pointer; margin-left: 10px; }

/* MAIN */
.container {
  max-width: 750px;
  margin: 80px auto;
  padding: 30px;
  border-radius: 20px;
  background: rgba(2,6,23,0.7);
}

body.light .container { background: white; }
body.glass .container {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
}

/* DROP */
#dropzone {
  height: 180px;
  border: 2px dashed #64748b;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  margin-bottom: 15px;
  transition: 0.2s;
}

#dropzone.hover {
  border-color: #22c55e;
  box-shadow: 0 0 25px rgba(34,197,94,0.5);
  transform: scale(1.02);
}

/* FILE CARD */
#fileCard {
  display: none;
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  margin-bottom: 10px;
}

/* BUTTONS */
button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  margin: 5px;
  cursor: pointer;
}

button:hover {
  transform: translateY(-2px);
}

/* PROGRESS */
#progressBar {
  height: 6px;
  width: 0%;
  background: #22c55e;
  margin-top: 10px;
}

/* OUTPUT */
#output {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  max-height: 250px;
  overflow: auto;
  background: rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">NO-risk</div>
  <div class="nav-links">
    <a href="#" onclick="openUpload()">Upload</a>
    <a href="about.html">About</a>

    <span class="toggle" onclick="setMode('dark')">🌙</span>
    <span class="toggle" onclick="setMode('light')">☀️</span>
    <span class="toggle" onclick="setMode('glass')">🧊</span>
  </div>
</div>

<div class="container">
  <h1>File → JSON / Markdown</h1>

  <div id="dropzone">Click or Drag File</div>
  <input type="file" id="fileInput" hidden>

  <div id="fileCard"></div>

  <div>
    <button onclick="openUpload()">Upload File</button>
    <button id="toggleViewBtn">Switch to JSON</button>
    <button id="downloadJsonBtn" disabled>Download JSON</button>
    <button id="convertMdBtn" disabled>Convert to MD</button>
    <button id="downloadMdBtn" disabled>Download MD</button>
  </div>

  <div id="status">Upload a File</div>
  <div id="progressBar"></div>
  <div id="output"></div>
</div>

<script src="xlsx.full.min.js"></script>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const status = document.getElementById("status");
const progress = document.getElementById("progressBar");
const fileCard = document.getElementById("fileCard");

const toggleBtn = document.getElementById("toggleViewBtn");
const downloadJsonBtn = document.getElementById("downloadJsonBtn");
const convertMdBtn = document.getElementById("convertMdBtn");
const downloadMdBtn = document.getElementById("downloadMdBtn");

let fullData = null;
let markdownData = null;
let viewMode = "table";

/* MODE */
function setMode(mode) {
  document.body.classList.remove("light","glass");
  if (mode !== "dark") document.body.classList.add(mode);
}

/* OPEN */
function openUpload() {
  fileInput.value = "";
  fileInput.click();
}

/* RESET */
function resetUI() {
  output.innerHTML = "";
  status.textContent = "Upload a File...";
  progress.style.width = "0%";
  fileCard.style.display = "none";
  fullData = null;
  markdownData = null;
}

/* EVENTS */
dropzone.onclick = openUpload;

fileInput.addEventListener("change", () => {
  resetUI();
  handleFile(fileInput.files[0]);
});

dropzone.addEventListener("dragover", e => {
  e.preventDefault();
  dropzone.classList.add("hover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("hover");
});

dropzone.addEventListener("drop", e => {
  e.preventDefault();
  dropzone.classList.remove("hover");
  resetUI();
  handleFile(e.dataTransfer.files[0]);
});

/* HANDLE FILE */
async function handleFile(file) {
  if (!file) return;

  fileCard.style.display = "block";
  fileCard.innerHTML = `📄 ${file.name} (${(file.size/1024).toFixed(1)} KB)`;

  status.textContent = "Processing...";
  progress.style.width = "30%";

  let rows = [];

  if (file.name.endsWith(".csv")) {
    const text = await file.text();
    const lines = text.split("\n").filter(l => l.trim());
    const headers = lines[0].split(",");

    rows = lines.slice(1).map(line => {
      const values = line.split(",");
      let obj = {};
      headers.forEach((h,i)=>obj[h]=values[i]||"");
      return obj;
    });

  } else if (file.name.endsWith(".xlsx")) {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, {type:"array"});
    const sheet = wb.Sheets[wb.SheetNames[0]];
    rows = XLSX.utils.sheet_to_json(sheet);

  } else {
    status.textContent = "❌ Invalid file";
    return;
  }

  progress.style.width = "60%";

  /* SECURITY CHECKS */
  function ssn(t){return /\d{3}-\d{2}-\d{4}/.test(t);}
  function script(t){return /<script/i.test(t);}
  function html(t){return /<[^>]+>/.test(t);}
  function sql(t){return /(select|drop|insert|delete)/i.test(t);}
  function luhnCheck(num) {
  let sum = 0, flip = false;

  for (let i = num.length - 1; i >= 0; i--) {
    let n = +num[i];

    if (flip) {
      n *= 2;
      if (n > 9) n -= 9;
    }

    sum += n;
    flip = !flip;
  }

  return sum % 10 === 0;
}

function containsCard(text) {
  const digits = text.replace(/[^\d]/g, "");
  return digits.length >= 13 && digits.length <= 19 && luhnCheck(digits);
}

  for (const row of rows) {
    for (const k in row) {
      const v = String(row[k]);
     if (ssn(v) || containsCard(v) || script(v) || html(v) || sql(v)) {
        status.textContent = "❌ Blocked suspicious data";
        progress.style.width="0%";
        return;
      }
    }
  }

  fullData = rows;

  render();

  status.textContent = "✅ Passed all checks";
  progress.style.width = "100%";

  downloadJsonBtn.disabled = false;
  convertMdBtn.disabled = false;
}

/* RENDER */
function render() {
  if (!fullData) return;

  if (viewMode==="table") {
    let html = "<table style='width:100%;border-collapse:collapse'>";
    const keys = Object.keys(fullData[0]);

    html += "<tr>"+keys.map(k=>`<th>${k}</th>`).join("")+"</tr>";

    fullData.slice(0,50).forEach(r=>{
      html+="<tr>"+keys.map(k=>`<td>${r[k]||""}</td>`).join("")+"</tr>";
    });

    html+="</table>";
    output.innerHTML = html;

  } else {
    output.textContent = JSON.stringify(fullData,null,2);
  }
}

/* TOGGLE */
toggleBtn.onclick = () => {
  viewMode = viewMode==="table"?"json":"table";
  toggleBtn.textContent = viewMode==="table"?"Switch to JSON":"Switch to Table";
  render();
};

/* DOWNLOADS */
downloadJsonBtn.onclick = () => {
  const blob = new Blob([JSON.stringify(fullData)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download="file.json";
  a.click();
};

convertMdBtn.onclick = () => {
  const keys = Object.keys(fullData[0]);
  let md = "| "+keys.join(" | ")+" |\n";
  md += "| "+keys.map(()=> "---").join(" | ")+" |\n";
  fullData.forEach(r=>{
    md += "| "+keys.map(k=>r[k]||"").join(" | ")+" |\n";
  });
  markdownData = md;
  output.textContent = md;
  downloadMdBtn.disabled=false;
};

downloadMdBtn.onclick = () => {
  const blob = new Blob([markdownData],{type:"text/markdown"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download="file.md";
  a.click();
};
</script>

</body>
</html>

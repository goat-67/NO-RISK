<!DOCTYPE html>
<html>
<head>
  <title>NO-risk</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Inter", "Segoe UI", Arial;
  background: linear-gradient(to bottom, #1e293b, #0f172a);
  color: #e2e8f0;
  transition: 0.3s;
}

/* LIGHT MODE */
body.light {
  background: #f1f5f9;
  color: #0f172a;
}

/* NAVBAR */
.navbar {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  background: rgba(2,6,23,0.7);
}

body.light .navbar {
  background: white;
}

.logo {
  color: #60a5fa;
  font-weight: 600;
}

.toggle {
  cursor: pointer;
}

/* MAIN CARD */
.container {
  max-width: 720px;
  margin: 80px auto;
  padding: 30px;
  text-align: center;
  border-radius: 20px;
  background: rgba(2,6,23,0.7);
}

body.light .container {
  background: white;
}

/* DROPZONE */
#dropzone {
  height: 180px;
  border: 2px dashed #64748b;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 15px;
  transition: 0.2s;
}

body:not(.light) #dropzone.hover {
  border-color: #22c55e;
  box-shadow: 0 0 25px rgba(34,197,94,0.4);
}

/* FILE CARD */
#fileCard {
  display: none;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.05);
}

body.light #fileCard {
  background: #e2e8f0;
}

/* BUTTONS */
button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  margin: 5px;
  cursor: pointer;
}

button:disabled {
  background: gray;
}

/* STATUS */
#status {
  margin-top: 10px;
  font-size: 14px;
}

/* PROGRESS */
#progressBar {
  height: 6px;
  width: 0%;
  background: #22c55e;
  border-radius: 10px;
  margin-top: 10px;
  transition: width 0.3s;
}

/* OUTPUT */
#output {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  max-height: 250px;
  overflow: auto;
  background: rgba(0,0,0,0.4);
}

body.light #output {
  background: #e2e8f0;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">NO-risk</div>
  <div class="toggle" onclick="toggleMode()">🌓</div>
</div>

<div class="container">
  <h1>File → JSON / Markdown</h1>

  <div id="dropzone">Drag & Drop File</div>
  <input type="file" id="fileInput" hidden>

  <div id="fileCard"></div>

  <div>
    <button onclick="openUpload()">Upload File</button>
    <button id="downloadJsonBtn" disabled>Download JSON</button>
    <button id="convertMdBtn" disabled>Convert to MD</button>
    <button id="downloadMdBtn" disabled>Download MD</button>
  </div>

  <div id="status">Waiting...</div>
  <div id="progressBar"></div>
  <div id="output"></div>
</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const status = document.getElementById("status");
const progress = document.getElementById("progressBar");
const fileCard = document.getElementById("fileCard");

let fullData = null;
let markdownData = null;

/* MODE TOGGLE */
function toggleMode() {
  document.body.classList.toggle("light");
}

/* OPEN FILE */
function openUpload() {
  fileInput.click();
}

/* RESET UI */
function resetUI() {
  output.textContent = "";
  status.textContent = "Waiting...";
  progress.style.width = "0%";
  fileCard.style.display = "none";
  fullData = null;

  document.getElementById("downloadJsonBtn").disabled = true;
  document.getElementById("convertMdBtn").disabled = true;
  document.getElementById("downloadMdBtn").disabled = true;
}

/* FILE SELECT */
fileInput.addEventListener("change", () => {
  resetUI();
  handleFile(fileInput.files[0]);
});

/* DRAG */
dropzone.addEventListener("dragover", e => {
  e.preventDefault();
  dropzone.classList.add("hover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("hover");
});

dropzone.addEventListener("drop", e => {
  e.preventDefault();
  dropzone.classList.remove("hover");
  resetUI();
  handleFile(e.dataTransfer.files[0]);
});

/* HANDLE FILE */
async function handleFile(file) {
  if (!file) return;

  fileCard.style.display = "block";
  fileCard.textContent = file.name;

  status.textContent = "Uploading...";
  progress.style.width = "40%";

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch("https://no-risk-gkhr.onrender.com/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();
    progress.style.width = "80%";

    if (!res.ok) {
      status.textContent = "❌ " + data.detail;
      progress.style.width = "0%";
      return;
    }

    /* SUCCESS ONLY HERE */
    fullData = data.preview;
    output.textContent = JSON.stringify(data.preview, null, 2);

    status.textContent = "✅ Passed all checks";
    progress.style.width = "100%";

    document.getElementById("downloadJsonBtn").disabled = false;
    document.getElementById("convertMdBtn").disabled = false;

  } catch {
    status.textContent = "❌ Connection failed";
    progress.style.width = "0%";
  }
}

/* DOWNLOAD JSON */
downloadJsonBtn.onclick = () => {
  const blob = new Blob([JSON.stringify(fullData)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "file.json";
  a.click();
};

/* CONVERT MD */
convertMdBtn.onclick = () => {
  const keys = Object.keys(fullData[0]);
  let md = "| " + keys.join(" | ") + " |\n";
  md += "| " + keys.map(() => "---").join(" | ") + " |\n";

  fullData.forEach(r => {
    md += "| " + keys.map(k => r[k]).join(" | ") + " |\n";
  });

  markdownData = md;
  output.textContent = md;

  document.getElementById("downloadMdBtn").disabled = false;
};

/* DOWNLOAD MD */
downloadMdBtn.onclick = () => {
  const blob = new Blob([markdownData], {type:"text/markdown"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "file.md";
  a.click();
};
</script>

</body>
</html>

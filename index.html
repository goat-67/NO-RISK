
<!DOCTYPE html>
<html>
<head>
  <title>NO-risk</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Inter", "Segoe UI", Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
}

/* LIGHT MODE */
body.light {
  background: #f8fafc;
  color: #0f172a;
}

/* NAVBAR */
.navbar {
  padding: 16px 28px;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { color:#60a5fa; font-weight:600; }

.nav-links {
  display:flex;
  gap:15px;
  align-items:center;
}

#themeToggle {
  background:none;
  border:none;
  cursor:pointer;
  font-size:16px;
  color:#94a3b8;
}

/* MAIN */
.container {
  max-width:720px;
  margin:80px auto;
  padding:30px;
  background: rgba(2,6,23,0.6);
  border-radius:20px;
  text-align:center;
  box-shadow:0 20px 80px rgba(0,0,0,0.7);
}

body.light .container {
  background:white;
  box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

/* DROPZONE */
#dropzone {
  height:180px;
  border:2px dashed rgba(148,163,184,0.3);
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

body.light #dropzone {
  background:#f1f5f9;
}

#dropGlow {
  position:absolute;
  width:200px;
  height:200px;
  background: radial-gradient(circle, rgba(34,197,94,0.25), transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  opacity:0;
}

#dropzone:hover #dropGlow { opacity:1; }

/* FILE CARD */
.file-card {
  margin-top:12px;
  display:flex;
  gap:10px;
  align-items:center;
  padding:12px;
  border-radius:12px;
  background: rgba(255,255,255,0.05);
}

body.light .file-card {
  background:#f1f5f9;
}

.file-check { color:#22c55e; }

/* BUTTONS */
.buttons {
  margin-top:10px;
  display:flex;
  justify-content:center;
  gap:10px;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#3b82f6,#6366f1);
  color:white;
  cursor:pointer;
}

button:disabled {
  background:#1e293b;
  color:#64748b;
}

/* STATUS */
#status { margin-top:15px; }

/* PROGRESS */
#progressBar {
  width:100%;
  height:8px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

#progressFill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#4ade80);
}

/* OUTPUT */
#output {
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background: rgba(2,6,23,0.8);
  max-height:250px;
  overflow:auto;
  font-size:12px;
  text-align:left;
  white-space:pre-wrap;
}

body.light #output {
  background:#f8fafc;
}

input[type=file] { display:none; }

</style>
</head>
<body>

<div class="navbar">
  <div class="logo">NO-risk</div>
  <div class="nav-links">
    <button id="themeToggle" onclick="toggleTheme()">🌙</button>
    <a href="#" onclick="openUpload()">Upload</a>
    <a href="https://github.com/goat-67/NO-risk#readme" target="_blank">About</a>
  </div>
</div>

<div class="container">
  <h1>File → JSON / Markdown</h1>
  <p>Upload CSV or Excel and convert instantly</p>

  <div id="dropzone">
    <div id="dropGlow"></div>
    <div>
      📂<br>
      Drag & drop file<br>
      <small>or click</small>
    </div>
  </div>

  <div id="fileCard" style="display:none;">
    <div class="file-card">
      📄
      <div>
        <div id="fileName"></div>
        <div id="fileMeta" style="font-size:12px;"></div>
      </div>
      <div class="file-check">✓</div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".csv,.xlsx">

  <div class="buttons">
    <button onclick="openUpload()">Upload File</button>
    <button id="downloadJsonBtn" disabled>Download JSON</button>
    <button id="convertMdBtn" disabled>Convert to MD</button>
    <button id="downloadMdBtn" disabled>Download MD</button>
  </div>

  <div id="status">Waiting for file...</div>
  <div id="progressBar"><div id="progressFill"></div></div>

  <div id="output"></div>
</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const status = document.getElementById("status");
const output = document.getElementById("output");
const progressFill = document.getElementById("progressFill");

let fullData=null;
let markdownData=null;

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* FILE SELECT */
function openUpload(){ fileInput.click(); }

dropzone.onclick=()=>fileInput.click();

fileInput.addEventListener("change",()=>handleFile(fileInput.files[0]));

/* DRAG */
dropzone.addEventListener("dragover",(e)=>{
  e.preventDefault();
});

dropzone.addEventListener("drop",(e)=>{
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
});

/* GLOW FOLLOW */
const glow=document.getElementById("dropGlow");
dropzone.addEventListener("mousemove",(e)=>{
  const r=dropzone.getBoundingClientRect();
  glow.style.left=(e.clientX-r.left)+"px";
  glow.style.top=(e.clientY-r.top)+"px";
});

/* HANDLE FILE */
async function handleFile(file){
  if(!file) return;

  document.getElementById("fileCard").style.display="block";
  document.getElementById("fileName").textContent=file.name;
  document.getElementById("fileMeta").textContent=(file.size/1024).toFixed(1)+" KB";

  status.innerHTML="⏳ Processing...";
  progressFill.style.width="0%";

  const formData=new FormData();
  formData.append("file",file);

  const xhr=new XMLHttpRequest();
  xhr.open("POST","https://no-risk-gkhr.onrender.com/upload");

  xhr.setRequestHeader("x-api-key","Yp3!Rf8@Qx6#Lm1$Nz9^Ta5&Kc2*Hb7Ud4Vg0WeJk8SxPqR6tM3nB5C7dF9h");
  xhr.setRequestHeader("x-internal-secret","Zk7$Qv9!Lm2#Xr5@Tp8^Wd3*Ns6&Hy1AaB4cD7eF0gHjK9mPqR2sT5uV8wXyZ");

  xhr.upload.onprogress=(e)=>{
    if(e.lengthComputable){
      progressFill.style.width=(e.loaded/e.total*100)+"%";
    }
  };

  xhr.onload=()=>{
    const data=JSON.parse(xhr.responseText);

    if(xhr.status!==200){
      status.innerHTML="❌ "+(data.detail||"Error");
      return;
    }

    fullData=data.preview;
    output.textContent=JSON.stringify(data.preview,null,2);

    status.innerHTML="✅ Passed all checks";
    progressFill.style.width="100%";

    document.getElementById("downloadJsonBtn").disabled=false;
    document.getElementById("convertMdBtn").disabled=false;
  };

  xhr.send(formData);
}

/* DOWNLOAD */
document.getElementById("downloadJsonBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(fullData,null,2)]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.json";
  a.click();
};

document.getElementById("convertMdBtn").onclick=()=>{
  const keys=Object.keys(fullData[0]);
  let md="| "+keys.join(" | ")+" |\n";
  md+="| "+keys.map(()=> "---").join(" | ")+" |\n";
  fullData.forEach(r=>{
    md+="| "+keys.map(k=>r[k]||"").join(" | ")+" |\n";
  });
  markdownData=md;
  output.textContent=md;
  document.getElementById("downloadMdBtn").disabled=false;
};

document.getElementById("downloadMdBtn").onclick=()=>{
  const blob=new Blob([markdownData]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="data.md";
  a.click();
};
</script>

</body>
</html>

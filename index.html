<!DOCTYPE html>
<html>
<head>
  <title>NO-risk</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #0f172a;
      color: white;
      overflow-x: hidden; /* removes bottom scroll */
    }

    /* NAVBAR */
    .navbar {
      width: 100%;
      padding: 15px 20px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      color: #3b82f6;
    }

    .nav-links {
      display: flex;
      gap: 15px;
    }

    .nav-links a {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
    }

    .nav-links a:hover {
      color: white;
    }

    /* MAIN */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 60px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 25px;
    }

    #dropzone {
      width: 100%;
      max-width: 420px;
      height: 180px;
      border: 2px dashed #3b82f6;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: 0.2s;
    }

    #dropzone.hover {
      border-color: #22c55e;
      background: rgba(34,197,94,0.1);
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 15px;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      background: #334155;
      cursor: not-allowed;
    }

    #status {
      margin-top: 15px;
      color: #94a3b8;
    }

    #output {
      margin-top: 20px;
      width: 100%;
      max-width: 450px;
      max-height: 200px;
      overflow: auto;
      background: rgba(0,0,0,0.5);
      padding: 15px;
      border-radius: 12px;
      text-align: left;
      font-size: 13px;
    }

    input {
      display: none;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">NO-risk</div>
  <div class="nav-links">
    <a href="#" onclick="openUpload()">Upload</a>
    <a href="https://github.com/goat-67/NO-risk#readme" target="_blank">About</a>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <h1>File → JSON Converter</h1>
  <p>Upload CSV or Excel files securely</p>

  <div id="dropzone">Drag file here</div>
  <input type="file" id="fileInput" accept=".xlsx,.csv">

  <div class="buttons">
    <button onclick="openUpload()">Upload File</button>
    <button id="downloadBtn" disabled>Download JSON</button>
  </div>

  <div id="status">Waiting for file...</div>
  <div id="output"></div>
</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const status = document.getElementById("status");
const downloadBtn = document.getElementById("downloadBtn");

let fullData = null;

// Open file explorer
function openUpload() {
  fileInput.click();
}

// File selected
fileInput.addEventListener("change", () => {
  handleFile(fileInput.files[0]);
});

// Drag events
dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("hover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("hover");
});

dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("hover");
  handleFile(e.dataTransfer.files[0]);
});

// Handle file
async function handleFile(file) {
  if (!file) return;

  const name = file.name.toLowerCase();

  if (!(name.endsWith(".xlsx") || name.endsWith(".csv"))) {
    status.textContent = "❌ Only CSV or Excel files allowed";
    return;
  }

  status.textContent = "⏳ Processing...";
  output.textContent = "";
  downloadBtn.disabled = true;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch("http://127.0.0.1:8000/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    status.textContent = "✅ Done";

    // show preview
    output.textContent = JSON.stringify(data.preview, null, 2);

    // store full data
    fullData = data.full_data;

    // enable download button
    downloadBtn.disabled = false;

  } catch (err) {
    status.textContent = "❌ Error connecting to backend";
  }
}

// Download JSON
downloadBtn.onclick = () => {
  if (!fullData) return;

  const blob = new Blob(
    [JSON.stringify(fullData, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "converted.json";
  a.click();

  URL.revokeObjectURL(url);
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>NO-risk</title>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Inter", "Segoe UI", Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #e2e8f0;
  overflow-x: hidden;
}

/* NAVBAR */
.navbar {
  width: 100%;
  padding: 16px 28px;
  background: rgba(2, 6, 23, 0.7);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
  font-size: 18px;
  font-weight: 600;
  color: #60a5fa;
}

/* MAIN CARD */
.container {
  max-width: 720px;
  margin: 80px auto;
  padding: 30px;
  text-align: center;
  background: rgba(2,6,23,0.6);
  border-radius: 20px;
  position: relative;
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 20px 80px rgba(0,0,0,0.7);
}

.container::before {
  content: "";
  position: absolute;
  inset: -2px;
  background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 70%);
  filter: blur(50px);
  z-index: -1;
}

/* TITLE */
h1 {
  font-size: 30px;
  margin-bottom: 8px;
}

p {
  color: #94a3b8;
  margin-bottom: 30px;
}

/* DROPZONE */
#dropzone {
  width: 100%;
  height: 180px;
  border: 2px dashed rgba(148,163,184,0.3);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 15px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

#dropzone::after {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(34,197,94,0.15), transparent 60%);
  opacity: 0;
  transition: 0.3s;
}

#dropzone.hover::after {
  opacity: 1;
}

#dropzone.hover {
  border-color: #22c55e;
  transform: scale(1.02);
}

/* BUTTONS */
.buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(59,130,246,0.6);
}

button:disabled {
  background: #1e293b;
  color: #64748b;
  box-shadow: none;
}

/* STATUS */
#status {
  margin-top: 18px;
  font-size: 14px;
}

/* OUTPUT */
#output {
  margin-top: 20px;
  background: rgba(2,6,23,0.8);
  border-radius: 14px;
  padding: 15px;
  max-height: 250px;
  overflow: auto;
  text-align: left;
  font-size: 12px;
  white-space: pre-wrap;
}

/* HIDE INPUT */
input[type="file"] {
  display: none;
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">NO-risk</div>
  <div class="nav-links">
    <a href="#" onclick="openUpload()">Upload</a>
    <a href="https://github.com/goat-67/NO-risk#readme" target="_blank">About</a>
  </div>
</div>

<div class="container">
  <h1>File → JSON / Markdown</h1>
  <p>Upload CSV or Excel and convert instantly</p>

  <div id="dropzone">
    <div>
      <div style="font-size:40px;">📂</div>
      <div style="margin-top:10px;">Drag & drop file</div>
      <div style="font-size:12px;color:#64748b;">or click to upload</div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".xlsx,.csv">

  <div class="buttons">
    <button onclick="openUpload()">Upload File</button>
    <button id="downloadJsonBtn" disabled>Download JSON</button>
    <button id="convertMdBtn" disabled>Convert to MD</button>
    <button id="downloadMdBtn" disabled>Download MD</button>
  </div>

  <div id="status">Waiting for file...</div>
  <div id="output"></div>
</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const status = document.getElementById("status");

const downloadJsonBtn = document.getElementById("downloadJsonBtn");
const convertMdBtn = document.getElementById("convertMdBtn");
const downloadMdBtn = document.getElementById("downloadMdBtn");

let fullData = null;
let markdownData = null;

function openUpload() {
  fileInput.click();
}

dropzone.onclick = () => fileInput.click();

fileInput.addEventListener("change", () => {
  handleFile(fileInput.files[0]);
});

dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("hover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("hover");
});

dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("hover");
  handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  if (!file) return;

  const name = file.name.toLowerCase();

  if (!(name.endsWith(".xlsx") || name.endsWith(".csv"))) {
    status.innerHTML = "❌ <b>Only CSV or Excel files allowed</b>";
    status.style.color = "#ef4444";
    return;
  }

  status.innerHTML = "⏳ <b>Processing file...</b>";
  status.style.color = "#facc15";

  output.textContent = "";

  downloadJsonBtn.disabled = true;
  convertMdBtn.disabled = true;
  downloadMdBtn.disabled = true;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch("https://no-risk-gkhr.onrender.com/upload", {
      method: "POST",
      headers: {
        "x-api-key": "Yp3!Rf8@Qx6#Lm1$Nz9^Ta5&Kc2*Hb7Ud4Vg0WeJk8SxPqR6tM3nB5C7dF9h",
        "x-internal-secret": "Zk7$Qv9!Lm2#Xr5@Tp8^Wd3*Ns6&Hy1AaB4cD7eF0gHjK9mPqR2sT5uV8wXyZ"
      },
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      status.innerHTML = "❌ <b>" + (data.detail || "Upload failed") + "</b>";
      status.style.color = "#ef4444";
      return;
    }

    fullData = data.preview;

    output.textContent = JSON.stringify(data.preview, null, 2);

    status.innerHTML = "✅ <b>Secure • Passed all checks</b>";
    status.style.color = "#22c55e";

    downloadJsonBtn.disabled = false;
    convertMdBtn.disabled = false;

  } catch (err) {
    status.innerHTML = "❌ <b>Backend connection failed</b>";
    status.style.color = "#ef4444";
  }
}

downloadJsonBtn.onclick = () => {
  if (!fullData) return;

  const blob = new Blob(
    [JSON.stringify(fullData, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "converted.json";
  a.click();

  URL.revokeObjectURL(url);
};

convertMdBtn.onclick = () => {
  if (!fullData || !fullData.length) return;

  const keys = Object.keys(fullData[0]);

  let md = "| " + keys.join(" | ") + " |\n";
  md += "| " + keys.map(() => "---").join(" | ") + " |\n";

  fullData.forEach(row => {
    md += "| " + keys.map(k => row[k] ?? "").join(" | ") + " |\n";
  });

  markdownData = md;
  output.textContent = md;

  status.innerHTML = "✅ <b>Converted to Markdown</b>";
  status.style.color = "#22c55e";

  downloadMdBtn.disabled = false;
};

downloadMdBtn.onclick = () => {
  if (!markdownData) return;

  const blob = new Blob([markdownData], { type: "text/markdown" });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "converted.md";
  a.click();

  URL.revokeObjectURL(url);
};
</script>

</body>
</html>

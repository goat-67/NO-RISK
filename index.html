<!DOCTYPE html>
<html>
<head>
  <title>NO-risk</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Inter", "Segoe UI", Arial;
  color: #e2e8f0;
  transition: 0.3s;
}

/* =========================
   MODES
========================= */

/* DARK */
body {
  background:
    radial-gradient(circle at 20% 0%, #1e293b, transparent),
    linear-gradient(to bottom, #0f172a, #020617);
}

/* LIGHT */
body.light {
  background:
    radial-gradient(circle at 20% 0%, #ffffff, #e2e8f0 60%, #cbd5e1);
  color: #0f172a;
}

/* GLASS */
body.glass {
  background: linear-gradient(120deg, #1e3a8a, #0f172a, #1e293b);
  background-size: 200% 200%;
  animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* =========================
   NAVBAR
========================= */

.navbar {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(10px);
  position: relative;
}

body.light .navbar { background: white; }

body.glass .navbar {
  background: rgba(255,255,255,0.05);
}

.logo {
  color: #60a5fa;
  font-weight: 600;
}

/* =========================
   TOGGLE SWITCHES
========================= */

.switch {
  position: relative;
  display: inline-block;
  width: 46px;
  height: 24px;
  margin-left: 10px;
}

.switch input { display: none; }

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: #64748b;
  border-radius: 999px;
  transition: 0.3s;
}

.slider:before {
  content: "";
  position: absolute;
  height: 18px;
  width: 18px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #22c55e;
}

input:checked + .slider:before {
  transform: translateX(22px);
}

/* =========================
   MESSAGE
========================= */

#message {
  position: fixed;
  top: 70px;
  right: 20px;
  font-size: 13px;
  padding: 10px 14px;
  border-radius: 10px;
  max-width: 260px;
  backdrop-filter: blur(8px);
  z-index: 999;
}

body:not(.light) #message {
  color: white;
  background: rgba(255,255,255,0.05);
}

body.light #message {
  color: black;
  background: rgba(0,0,0,0.05);
}

/* =========================
   MAIN CARD
========================= */

.container {
  max-width: 720px;
  margin: 80px auto;
  padding: 30px;
  text-align: center;
  border-radius: 20px;
  background: rgba(2,6,23,0.7);
  box-shadow: 0 25px 70px rgba(0,0,0,0.7);
  position: relative;
}

/* glow border */
.container::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 20px;
  background: linear-gradient(120deg, #3b82f6, #22c55e);
  opacity: 0.3;
  z-index: -1;
}

body.light .container {
  background: white;
}

body.glass .container {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px) saturate(140%);
}

/* =========================
   DROPZONE
========================= */

#dropzone {
  height: 180px;
  border: 2px dashed #64748b;
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 15px;
  transition: 0.2s;
  animation: pulse 2.5s infinite;
}

#dropzone.hover {
  border-color: #22c55e;
  box-shadow: 0 0 25px rgba(34,197,94,0.4);
  transform: scale(1.02);
}

@keyframes pulse {
  50% { box-shadow: 0 0 20px rgba(34,197,94,0.3); }
}

/* =========================
   FILE CARD
========================= */

#fileCard {
  display: none;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
}

#fileCard:hover {
  transform: translateY(-3px);
}

/* =========================
   BUTTONS
========================= */

button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  margin: 5px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(59,130,246,0.5);
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}

/* =========================
   STATUS
========================= */

#status {
  margin-top: 10px;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(34,197,94,0.15);
  color: #22c55e;
  display: inline-block;
}

/* =========================
   PROGRESS
========================= */

#progressBar {
  height: 6px;
  width: 0%;
  background: #22c55e;
  border-radius: 10px;
  margin-top: 10px;
  position: relative;
  overflow: hidden;
}

#progressBar::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  animation: shine 1.5s infinite;
}

@keyframes shine {
  100% { transform: translateX(100%); }
}

/* =========================
   OUTPUT
========================= */

#output {
  margin-top: 15px;
  padding: 10px;
  border-radius: 10px;
  max-height: 250px;
  overflow: auto;
  background: rgba(0,0,0,0.4);
  font-family: monospace;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">NO-risk</div>

  <div>
    <!-- DARK -->
    <label class="switch">
      <input type="radio" name="mode" onclick="setMode('dark')" checked>
      <span class="slider"></span>
    </label>

    <!-- LIGHT -->
    <label class="switch">
      <input type="radio" name="mode" onclick="setMode('light')">
      <span class="slider"></span>
    </label>

    <!-- GLASS -->
    <label class="switch">
      <input type="radio" name="mode" onclick="setMode('glass')">
      <span class="slider"></span>
    </label>
  </div>
</div>

<div id="message">
  All files are processed locally.<br>No data is uploaded.
</div>

<div class="container">
  <h1>File → JSON / Markdown</h1>

  <div id="dropzone">Drag & Drop File</div>
  <input type="file" id="fileInput" hidden>

  <div id="fileCard"></div>

  <div>
    <button onclick="openUpload()">Upload File</button>
    <button id="downloadJsonBtn" disabled>Download JSON</button>
    <button id="convertMdBtn" disabled>Convert to MD</button>
    <button id="downloadMdBtn" disabled>Download MD</button>
  </div>

  <div id="status">Upload a File...</div>
  <div id="progressBar"></div>
  <div id="output"></div>
</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const status = document.getElementById("status");
const progress = document.getElementById("progressBar");
const fileCard = document.getElementById("fileCard");

const downloadJsonBtn = document.getElementById("downloadJsonBtn");
const convertMdBtn = document.getElementById("convertMdBtn");
const downloadMdBtn = document.getElementById("downloadMdBtn");

let fullData = null;
let markdownData = null;

function setMode(mode) {
  document.body.classList.remove("light", "glass");
  if (mode !== "dark") document.body.classList.add(mode);
}

function openUpload() {
  fileInput.click();
}

function resetUI() {
  output.textContent = "";
  status.textContent = "Upload a File...";
  progress.style.width = "0%";
  fileCard.style.display = "none";
  fullData = null;
  markdownData = null;

  downloadJsonBtn.disabled = true;
  convertMdBtn.disabled = true;
  downloadMdBtn.disabled = true;
}

fileInput.addEventListener("change", () => {
  resetUI();
  handleFile(fileInput.files[0]);
});

dropzone.addEventListener("click", openUpload);

dropzone.addEventListener("dragover", e => {
  e.preventDefault();
  dropzone.classList.add("hover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("hover");
});

dropzone.addEventListener("drop", e => {
  e.preventDefault();
  dropzone.classList.remove("hover");
  resetUI();
  handleFile(e.dataTransfer.files[0]);
});

/* KEEPING YOUR LOGIC SAME */
async function handleFile(file) {
  if (!file) return;

  fileCard.style.display = "flex";
  fileCard.innerHTML = `
    <span>📄 ${file.name}</span>
    <span>${(file.size / 1024).toFixed(1)} KB</span>
  `;

  status.textContent = "Processing...";
  progress.style.width = "30%";

  const text = await file.text();
  const lines = text.split("\n").filter(l => l.trim());
  const headers = lines[0].split(",");

  const rows = lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h, i) => {
      obj[h.trim()] = (values[i] || "").trim();
    });
    return obj;
  });

  fullData = rows;
  output.textContent = JSON.stringify(rows.slice(0, 10), null, 2);

  status.textContent = "✅ Passed all checks";
  progress.style.width = "100%";

  downloadJsonBtn.disabled = false;
  convertMdBtn.disabled = false;
}

downloadJsonBtn.onclick = () => {
  const blob = new Blob([JSON.stringify(fullData)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "file.json";
  a.click();
};

convertMdBtn.onclick = () => {
  const keys = Object.keys(fullData[0]);
  let md = "| " + keys.join(" | ") + " |\n";
  md += "| " + keys.map(() => "---").join(" | ") + " |\n";

  fullData.forEach(r => {
    md += "| " + keys.map(k => r[k]).join(" | ") + " |\n";
  });

  markdownData = md;
  output.textContent = md;

  downloadMdBtn.disabled = false;
};

downloadMdBtn.onclick = () => {
  const blob = new Blob([markdownData], {type:"text/markdown"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "file.md";
  a.click();
};
</script>

</body>
</html>

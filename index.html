<!DOCTYPE html>
<html>
<head>
  <title>NO-risk</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    #dropzone {
      width: 400px;
      height: 200px;
      border: 2px dashed #3b82f6;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #dropzone:hover {
      border-color: #60a5fa;
      background: rgba(255,255,255,0.06);
    }

    #dropzone.hover {
      border-color: #22c55e;
      background: rgba(34,197,94,0.1);
    }

    #output {
      margin-top: 25px;
      width: 420px;
      max-height: 200px;
      overflow: auto;
      background: rgba(0,0,0,0.4);
      padding: 15px;
      border-radius: 12px;
      text-align: left;
      font-size: 13px;
      color: #e2e8f0;
    }

    input {
      display: none;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>NO-risk</h1>
  <p>Secure File → JSON Converter</p>

  <div id="dropzone">Click or Drag File</div>
  <input type="file" id="fileInput" accept=".xlsx,.csv">

  <div class="status" id="status">Waiting for file...</div>
  <div id="output"></div>
</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const status = document.getElementById("status");

dropzone.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", () => {
  handleFile(fileInput.files[0]);
});

dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("hover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("hover");
});

dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("hover");
  handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  if (!file) return;

  const name = file.name.toLowerCase();

  if (!(name.endsWith(".xlsx") || name.endsWith(".csv"))) {
    status.textContent = "❌ Only CSV or Excel files allowed";
    return;
  }

  status.textContent = "⏳ Processing...";

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch("http://127.0.0.1:8000/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    status.textContent = "✅ Done";
    output.textContent = JSON.stringify(data, null, 2);

  } catch (err) {
    status.textContent = "❌ Error connecting to backend";
  }
}
</script>

</body>
</html>

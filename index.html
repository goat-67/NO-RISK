<!DOCTYPE html>

<html>
<head>
  <title>NO-risk</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial;
      background: #0f172a;
      color: #e2e8f0;
    }
    .navbar {
      width: 100%;
      padding: 16px 24px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #1e293b;
    }
    .logo { color: #3b82f6; font-weight: 600; }
    .container {
      max-width: 700px;
      margin: 60px auto;
      text-align: center;
      padding: 20px;
    }
    #dropzone {
      height: 180px;
      border: 2px dashed #334155;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020617;
      margin-bottom: 15px;
    }
    button {
      padding: 10px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    #output {
      margin-top: 20px;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 15px;
      max-height: 250px;
      overflow: auto;
      text-align: left;
      font-size: 12px;
      white-space: pre-wrap;
    }
    input { display: none; }
  </style>
</head>
<body>

<div class="navbar">
  <div class="logo">NO-risk</div>
</div>

<div class="container">
  <h1>File → JSON / Markdown</h1>

  <div id="dropzone">Drag file here</div>
  <input type="file" id="fileInput" accept=".xlsx,.csv">

<button onclick="openUpload()">Upload File</button>

  <div id="status">Waiting...</div>
  <div id="output"></div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const dropzone = document.getElementById("dropzone");
const output = document.getElementById("output");
const status = document.getElementById("status");

let fullData = null;

// 🔑 YOUR BACKEND
const API_URL = "https://no-risk-gkhr.onrender.com/upload";

// 🔑 PUT YOUR KEYS HERE
const API_KEY = "Yp3!Rf8@Qx6#Lm1$Nz9^Ta5&Kc2*Hb7Ud4Vg0WeJk8SxPqR6tM3nB5C7dF9h";
const SECRET = "Zk7$Qv9!Lm2#Xr5@Tp8^Wd3*Ns6&Hy1AaB4cD7eF0gHjK9mPqR2sT5uV8wXyZ";

function openUpload() {
  fileInput.click();
}

fileInput.addEventListener("change", () => {
  handleFile(fileInput.files[0]);
});

dropzone.addEventListener("dragover", e => {
  e.preventDefault();
});

dropzone.addEventListener("drop", e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  if (!file) return;

  status.textContent = "⏳ Uploading...";
  output.textContent = "";

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "x-api-key": API_KEY,
        "x-internal-secret": SECRET
      },
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      status.textContent = "❌ " + (data.detail || "Upload failed");
      return;
    }

    fullData = data.preview;

    output.textContent = JSON.stringify(data.preview, null, 2);
    status.textContent = "✅ Success";

  } catch (err) {
    status.textContent = "❌ Cannot connect to backend";
  }
}
</script>

</body>
</html>

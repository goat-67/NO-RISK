<!DOCTYPE html>
<html>
<head>
  <title>NO-risk</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial;
      background: #0f172a;
      color: #e2e8f0;
      overflow-x: hidden;
    }

    /* NAVBAR */
    .navbar {
      width: 100%;
      padding: 16px 24px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: #3b82f6;
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-links a {
      text-decoration: none;
      color: #94a3b8;
      font-size: 14px;
      transition: 0.2s;
    }

    .nav-links a:hover {
      color: white;
    }

    /* MAIN */
    .container {
      max-width: 700px;
      margin: 60px auto;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    /* DROPZONE */
    #dropzone {
      width: 100%;
      height: 180px;
      border: 2px dashed #334155;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020617;
      transition: 0.2s;
      margin-bottom: 15px;
    }

    #dropzone.hover {
      border-color: #22c55e;
      background: rgba(34,197,94,0.1);
    }

    /* BUTTONS */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      background: #334155;
      cursor: not-allowed;
    }

    /* STATUS */
    #status {
      margin-top: 15px;
      color: #94a3b8;
      font-size: 14px;
    }

    /* OUTPUT */
    #output {
      margin-top: 20px;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 15px;
      max-height: 250px;
      overflow: auto;
      text-align: left;
      font-size: 12px;
      white-space: pre-wrap;
    }

    input {
      display: none;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">NO-risk</div>
  <div class="nav-links">
    <a href="#" onclick="openUpload()">Upload</a>
    <a href="https://github.com/goat-67/NO-risk#readme" target="_blank">About</a>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <h1>File → JSON / Markdown</h1>
  <p>Upload CSV or Excel and convert instantly</p>

  <div id="dropzone">Drag file here</div>
  <input type="file" id="fileInput" accept=".xlsx,.csv">

  <div class="buttons">
    <button onclick="openUpload()">Upload File</button>
    <button id="downloadJsonBtn" disabled>Download JSON</button>
    <button id="convertMdBtn" disabled>Convert to MD</button>
    <button id="downloadMdBtn" disabled>Download MD</button>
  </div>

  <div id="status">Waiting for file...</div>
  <div id="output"></div>
</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const status = document.getElementById("status");

const downloadJsonBtn = document.getElementById("downloadJsonBtn");
const convertMdBtn = document.getElementById("convertMdBtn");
const downloadMdBtn = document.getElementById("downloadMdBtn");

let fullData = null;
let markdownData = null;

function openUpload() {
  fileInput.click();
}

fileInput.addEventListener("change", () => {
  handleFile(fileInput.files[0]);
});

dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("hover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("hover");
});

dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("hover");
  handleFile(e.dataTransfer.files[0]);
});

async function handleFile(file) {
  if (!file) return;

  const name = file.name.toLowerCase();

  if (!(name.endsWith(".xlsx") || name.endsWith(".csv"))) {
    status.textContent = "❌ Only CSV or Excel files allowed";
    return;
  }

  status.textContent = "⏳ Processing...";
  output.textContent = "";

  downloadJsonBtn.disabled = true;
  convertMdBtn.disabled = true;
  downloadMdBtn.disabled = true;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch("http://127.0.0.1:8000/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    // 🚨 HANDLE BACKEND ERRORS
    if (data.error) {
      status.textContent = "❌ " + data.error;
      return;
    }

    // ✅ SUCCESS
    fullData = data.full_data;

    output.textContent = JSON.stringify(data.preview, null, 2);
    status.textContent = "✅ File ready";

    downloadJsonBtn.disabled = false;
    convertMdBtn.disabled = false;

  } catch (err) {
    status.textContent = "❌ Backend connection failed";
  }
}
downloadJsonBtn.onclick = () => {
  if (!fullData) return;

  const blob = new Blob(
    [JSON.stringify(fullData, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "converted.json";
  a.click();

  URL.revokeObjectURL(url);
};

convertMdBtn.onclick = () => {
  if (!fullData || !fullData.length) return;

  const keys = Object.keys(fullData[0]);

  let md = "| " + keys.join(" | ") + " |\n";
  md += "| " + keys.map(() => "---").join(" | ") + " |\n";

  fullData.forEach(row => {
    md += "| " + keys.map(k => row[k] ?? "").join(" | ") + " |\n";
  });

  markdownData = md;
  output.textContent = md;
  status.textContent = "✅ Converted to Markdown";

  downloadMdBtn.disabled = false;
};

downloadMdBtn.onclick = () => {
  if (!markdownData) return;

  const blob = new Blob([markdownData], { type: "text/markdown" });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  a.href = url;
  a.download = "converted.md";
  a.click();

  URL.revokeObjectURL(url);
};
</script>

</body>
</html>

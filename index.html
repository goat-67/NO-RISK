<!DOCTYPE html>
<html>
<head>
<title>NO-risk</title>

<!-- LOCAL XLSX (from your repo) -->
<script src="xlsx.full.min.js"></script>

<style>
* { box-sizing: border-box; }
body {
  margin:0;
  font-family: "Inter", Arial;
  transition: 0.3s;
}

/* ================= MODES ================= */

/* DARK */
body {
  background: linear-gradient(-45deg,#0f172a,#020617,#1e293b,#020617);
  background-size: 400% 400%;
  animation: darkMove 12s ease infinite;
  color:#e2e8f0;
}

@keyframes darkMove {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* LIGHT */
body.light {
  background: linear-gradient(-45deg,#ffffff,#e2e8f0,#cbd5e1,#f1f5f9);
  background-size: 400% 400%;
  animation: lightMove 12s ease infinite;
  color:#0f172a;
}

@keyframes lightMove {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* GLASS */
body.glass {
  background: linear-gradient(120deg,#1e3a8a,#0f172a,#1e293b);
}

/* ================= NAV ================= */

.navbar {
  padding:16px 28px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.logo { color:#60a5fa; }

/* toggle */
.toggle {
  cursor:pointer;
  margin-left:10px;
}

/* ================= CARD ================= */

.container {
  max-width:720px;
  margin:80px auto;
  padding:30px;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
}

/* ================= DROPZONE ================= */

#dropzone {
  height:180px;
  border:2px dashed #64748b;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:15px;
  border-radius:15px;
  transition:0.2s;
}

#dropzone.hover {
  border-color:#22c55e;
  box-shadow:0 0 25px rgba(34,197,94,0.4);
}

/* ================= FILE CARD ================= */

#fileCard {
  display:none;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  margin-bottom:10px;
}

/* ================= BUTTONS ================= */

button {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  margin:5px;
  cursor:pointer;
}

button:hover {
  transform:translateY(-2px);
}

/* ================= STATUS ================= */

#status { margin-top:10px; }

/* ================= PROGRESS ================= */

#progressBar {
  height:6px;
  background:#22c55e;
  width:0%;
  border-radius:10px;
  margin-top:10px;
}

/* ================= OUTPUT ================= */

#output {
  margin-top:15px;
  padding:10px;
  border-radius:10px;
  max-height:250px;
  overflow:auto;
  background:rgba(0,0,0,0.4);
  font-family:monospace;
}

/* ================= TABLE ================= */

table {
  width:100%;
  border-collapse:collapse;
}

td, th {
  border:1px solid rgba(255,255,255,0.2);
  padding:6px;
  font-size:12px;
}

/* highlight bad */
.bad {
  background:#dc2626 !important;
  color:white;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">NO-risk</div>
  <div>
    <span class="toggle" onclick="setMode('dark')">🌙</span>
    <span class="toggle" onclick="setMode('light')">☀️</span>
    <span class="toggle" onclick="setMode('glass')">🧊</span>
  </div>
</div>

<div class="container">
<h1>File → JSON / Markdown</h1>

<div id="dropzone">Drag & Drop File</div>
<input type="file" id="fileInput" hidden>

<div id="fileCard"></div>

<div>
  <button onclick="openUpload()">Upload File</button>
  <button id="toggleViewBtn" disabled>Toggle Table</button>
  <button id="downloadJsonBtn" disabled>Download JSON</button>
  <button id="convertMdBtn" disabled>Convert to MD</button>
  <button id="downloadMdBtn" disabled>Download MD</button>
</div>

<div id="status">Upload a File...</div>
<div id="progressBar"></div>
<div id="output"></div>

</div>

<script>
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const status = document.getElementById("status");
const progress = document.getElementById("progressBar");
const fileCard = document.getElementById("fileCard");

const downloadJsonBtn = document.getElementById("downloadJsonBtn");
const convertMdBtn = document.getElementById("convertMdBtn");
const downloadMdBtn = document.getElementById("downloadMdBtn");
const toggleViewBtn = document.getElementById("toggleViewBtn");

let fullData = null;
let markdownData = null;
let tableMode = false;

/* MODE */
function setMode(mode){
  document.body.classList.remove("light","glass");
  if(mode !== "dark") document.body.classList.add(mode);
}

/* UPLOAD */
function openUpload(){
  fileInput.click();
}

fileInput.addEventListener("change",()=>{
  handleFile(fileInput.files[0]);
});

dropzone.onclick = openUpload;

dropzone.addEventListener("dragover",e=>{
  e.preventDefault();
  dropzone.classList.add("hover");
});

dropzone.addEventListener("dragleave",()=>{
  dropzone.classList.remove("hover");
});

dropzone.addEventListener("drop",e=>{
  e.preventDefault();
  dropzone.classList.remove("hover");
  handleFile(e.dataTransfer.files[0]);
});

/* SENSITIVE CHECK */
function containsSSN(text){
  return /\b\d{3}-\d{2}-\d{4}\b/.test(text);
}

function luhnCheck(num){
  let sum=0,flip=false;
  for(let i=num.length-1;i>=0;i--){
    let n=+num[i];
    if(flip){ n*=2; if(n>9)n-=9; }
    sum+=n; flip=!flip;
  }
  return sum%10===0;
}

function containsCard(text){
  const digits=text.replace(/[^\d]/g,"");
  return digits.length>=13 && digits.length<=19 && luhnCheck(digits);
}

/* HANDLE FILE */
async function handleFile(file){
  if(!file) return;

  fileCard.style.display="block";
  fileCard.textContent=file.name;

  progress.style.width="30%";

  let rows=[];

  if(file.name.endsWith(".csv")){
    const text=await file.text();
    const lines=text.split("\n").filter(l=>l.trim());
    const headers=lines[0].split(",");

    rows=lines.slice(1).map(l=>{
      const vals=l.split(",");
      let obj={};
      headers.forEach((h,i)=>obj[h.trim()]=(vals[i]||"").trim());
      return obj;
    });

  } else if(file.name.endsWith(".xlsx")){
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data,{type:"array"});
    const sheet=wb.Sheets[wb.SheetNames[0]];
    rows=XLSX.utils.sheet_to_json(sheet);

  } else {
    status.textContent="❌ Only CSV/XLSX";
    return;
  }

  fullData = rows;

  renderOutput();

  status.textContent="✅ Processed";
  progress.style.width="100%";

  downloadJsonBtn.disabled=false;
  convertMdBtn.disabled=false;
  toggleViewBtn.disabled=false;
}

/* RENDER */
function renderOutput(){
  if(!tableMode){
    output.textContent = JSON.stringify(fullData.slice(0,10),null,2);
  } else {
    let html="<table><tr>";
    const keys=Object.keys(fullData[0]);

    keys.forEach(k=>html+=`<th>${k}</th>`);
    html+="</tr>";

    fullData.slice(0,50).forEach(row=>{
      html+="<tr>";
      keys.forEach(k=>{
        let val=String(row[k]);
        let bad = containsSSN(val)||containsCard(val);
        html+=`<td class="${bad?'bad':''}">${val}</td>`;
      });
      html+="</tr>";
    });

    html+="</table>";
    output.innerHTML=html;
  }
}

/* TOGGLE VIEW */
toggleViewBtn.onclick=()=>{
  tableMode=!tableMode;
  renderOutput();
};

/* DOWNLOAD JSON */
downloadJsonBtn.onclick=()=>{
  const blob=new Blob([JSON.stringify(fullData)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="file.json";
  a.click();
};

/* CONVERT MD */
convertMdBtn.onclick=()=>{
  const keys=Object.keys(fullData[0]);
  let md="| "+keys.join(" | ")+" |\n";
  md+="| "+keys.map(()=> "---").join(" | ")+" |\n";

  fullData.forEach(r=>{
    md+="| "+keys.map(k=>r[k]).join(" | ")+" |\n";
  });

  markdownData=md;
  output.textContent=md;
  downloadMdBtn.disabled=false;
};

/* DOWNLOAD MD */
downloadMdBtn.onclick=()=>{
  const blob=new Blob([markdownData],{type:"text/markdown"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="file.md";
  a.click();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>NO-risk Upload</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #f5f5f5;
    }

    h1 {
      margin-top: 40px;
    }

    #dropzone {
      width: 450px;
      height: 220px;
      border: 3px dashed #888;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 40px auto;
      background-color: white;
      transition: 0.2s;
      font-size: 18px;
    }

    #dropzone.hover {
      border-color: green;
      background-color: #f0fff0;
    }

    #output {
      width: 450px;
      margin: 20px auto;
      padding: 15px;
      background: white;
      border-radius: 10px;
      text-align: left;
      white-space: pre-wrap;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h1>Upload Excel or CSV File</h1>

<div id="dropzone">Drag & Drop (.xlsx or .csv)</div>

<div id="output">Waiting for file...</div>

<script>
const dropzone = document.getElementById("dropzone");
const output = document.getElementById("output");

dropzone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropzone.classList.add("hover");
});

dropzone.addEventListener("dragleave", () => {
  dropzone.classList.remove("hover");
});

dropzone.addEventListener("drop", async (e) => {
  e.preventDefault();
  dropzone.classList.remove("hover");

  const file = e.dataTransfer.files[0];

  if (!file) {
    output.textContent = "❌ No file detected.";
    return;
  }

  const name = file.name.toLowerCase();

  if (!(name.endsWith(".xlsx") || name.endsWith(".csv"))) {
    output.textContent = "❌ Only .xlsx or .csv files allowed.";
    return;
  }

  if (file.size > 50 * 1024 * 1024) {
    output.textContent = "❌ File too large.";
    return;
  }

  output.textContent = "⏳ Uploading and processing...";

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch("http://127.0.0.1:8000/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    output.textContent = "✅ Processed!\n\n" + JSON.stringify(data, null, 2);

  } catch (err) {
    output.textContent = "❌ Error connecting to backend.";
  }
});
</script>

</body>
</html>
